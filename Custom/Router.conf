[profile]
device_name=HomeLab
default_ip=192.168.10.1

[packages.remove]
luci-theme-argon
nikki
mihomo
mosdns
onionshare-cli

[packages.clone]
vitoegg/Argon luci-theme-argon
vitoegg/OpenNikki luci-app-nikki
sbwml/luci-app-mosdns luci-app-mosdns v5

[private.copy]
uFiles/update_mosdns_rules.sh => files/usr/share/task/update_mosdns_rules.sh

[files.download]
https://raw.githubusercontent.com/vitoegg/Provider/master/RuleSet/Extra/MosDNS/geoip.txt => files/etc/mosdns/rule/geoip.txt
https://raw.githubusercontent.com/vitoegg/Provider/master/RuleSet/Extra/MosDNS/reject.txt => files/etc/mosdns/rule/reject.txt
https://raw.githubusercontent.com/vitoegg/Provider/master/RuleSet/Extra/MosDNS/apple.txt => files/etc/mosdns/rule/apple.txt
https://raw.githubusercontent.com/vitoegg/Provider/master/RuleSet/Extra/MosDNS/direct.txt => files/etc/mosdns/rule/direct.txt
https://raw.githubusercontent.com/vitoegg/Provider/master/RuleSet/Extra/MosDNS/china.txt => files/etc/mosdns/rule/china.txt
https://raw.githubusercontent.com/vitoegg/Provider/master/RuleSet/Extra/MosDNS/foreign.txt => files/etc/mosdns/rule/foreign.txt
https://raw.githubusercontent.com/vitoegg/OpenNikki/master/nikki/files/nftables/geoip_cn.nft => files/etc/nikki/nftables/geoip_cn.nft
https://raw.githubusercontent.com/vitoegg/OpenNikki/master/nikki/files/nftables/geoip6_cn.nft => files/etc/nikki/nftables/geoip6_cn.nft

[nikki.ui]
url=https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
dest=files/etc/nikki/run/ui/zashboard

[cron]
4 4 */3 * * sync && echo 3 > /proc/sys/vm/drop_caches

[cron.if_exists]
files/usr/share/task/update_mosdns_rules.sh => 33 3 * * 6 /usr/share/task/update_mosdns_rules.sh > /dev/null 2>&1

[uci]
# WAN1 VLAN and PPPoE
uci set network.wan_vlan='device'
uci set network.wan_vlan.type='8021q'
uci set network.wan_vlan.ifname='eth1'
uci set network.wan_vlan.vid='$VLAN_ID'
uci set network.wan_vlan.name='eth1.$VLAN_ID'
uci set network.wan_vlan.macaddr='$PPPOE_MAC'
uci set network.wan_vlan.ipv6='1'
uci set network.wan.device='eth1.$VLAN_ID'
uci set network.wan.proto='pppoe'
uci set network.wan.username='$PPPOE_USERNAME'
uci set network.wan.password='$PPPOE_PASSWORD'
uci set network.wan.metric='10'
uci set network.wan.dns_metric='10'
uci set network.wan.multipath='off'
uci set network.wan_pppoe_device='device'
uci set network.wan_pppoe_device.name='pppoe-wan'
uci set network.wan_pppoe_device.macaddr='$PPPOE_WAN_MAC'
uci set network.wan_pppoe_device.ipv6='1'
uci commit network

# WAN1 IPv6
uci set network.wan.sourcefilter='0'
uci set network.wan.ipv6='1'
uci set network.wan.delegate='0'
uci -q delete network.wan6
uci set network.wan6='interface'
uci set network.wan6.device='@wan'
uci set network.wan6.proto='dhcpv6'
uci set network.wan6.reqaddress='try'
uci set network.wan6.reqprefix='no'
uci set network.wan6.delegate='0'
uci set network.wan6.sourcefilter='0'
uci set network.wan6.peerdns='0'
uci set network.wan6.metric='10'
uci set network.wan6.dns_metric='10'
uci set network.lan.delegate='0'
uci -q delete network.lan.ip6assign
uci -q delete network.lan.ip6hint
uci -q delete network.lan.ip6ifaceid
uci commit network

uci set dhcp.lan.ra='disabled'
uci set dhcp.lan.dhcpv6='disabled'
uci set dhcp.lan.ndp='disabled'
uci set dhcp.lan.ra_slaac='0'
uci -q delete dhcp.lan.ra_management
uci set dhcp.@dnsmasq[0].filter_aaaa='1'
uci commit dhcp

# Firewall wan zone membership
WAN_ZONE=$(uci -q show firewall | sed -n "/\.name='wan'$/s/\.name='wan'$//p" | head -n 1)
[ -n "$WAN_ZONE" ] || WAN_ZONE='firewall.@zone[1]'
uci -q del_list "$WAN_ZONE.network=wan6"
uci add_list "$WAN_ZONE.network=wan6"
uci commit firewall

# DNS fallback
uci set dhcp.@dnsmasq[0].noresolv='1'
uci -q del dhcp.@dnsmasq[0].server
uci add_list dhcp.@dnsmasq[0].server='$DNS_FALLBACK_SERVER'
uci -q del dhcp.@dnsmasq[0].dns_redirect
uci set dhcp.@dnsmasq[0].localservice='1'
uci -q del dhcp.@dnsmasq[0].interface
uci add_list dhcp.@dnsmasq[0].interface='lan'
uci commit dhcp

# Static DHCP leases
uci set dhcp.router='host'
uci set dhcp.router.name='Router'
uci set dhcp.router.mac='$ROUTER_MAC'
uci set dhcp.router.ip='192.168.10.3'
uci set dhcp.router.dns='1'
uci set dhcp.router.leasetime='infinite'
uci set dhcp.switch='host'
uci set dhcp.switch.name='Switch'
uci set dhcp.switch.mac='$SWITCH_MAC'
uci set dhcp.switch.ip='192.168.10.12'
uci set dhcp.switch.dns='1'
uci set dhcp.switch.leasetime='infinite'
uci commit dhcp

# Flow offloading
uci -q delete firewall.@defaults[0].flow_offloading_hw
uci set firewall.@defaults[0].flow_offloading='1'
uci commit firewall

# Transmit port forward
uci set firewall.transmit='redirect'
uci set firewall.transmit.name='Transmit'
uci set firewall.transmit.dest='lan'
uci set firewall.transmit.target='DNAT'
uci set firewall.transmit.src='wan'
uci set firewall.transmit.src_dport='$REDIRECT_SRC_DPORT'
uci set firewall.transmit.dest_ip='192.168.10.2'
uci set firewall.transmit.dest_port='$REDIRECT_DEST_PORT'
uci commit firewall

[uci.dual_wan]
# WAN2 VLAN and PPPoE
uci set network.wan2_vlan='device'
uci set network.wan2_vlan.type='8021q'
uci set network.wan2_vlan.ifname='eth1'
uci set network.wan2_vlan.vid='$VLAN_ID_2'
uci set network.wan2_vlan.name='eth1.$VLAN_ID_2'
uci set network.wan2_vlan.macaddr='$PPPOE_MAC_2'
uci set network.wan2_vlan.ipv6='0'
uci set network.wan2=interface
uci set network.wan2.device='eth1.$VLAN_ID_2'
uci set network.wan2.proto='pppoe'
uci set network.wan2.username='$PPPOE_USERNAME_2'
uci set network.wan2.password='$PPPOE_PASSWORD_2'
uci set network.wan2.metric='20'
uci set network.wan2.dns_metric='20'
uci set network.wan2.multipath='off'
uci set network.wan2.ipv6='0'
uci set network.wan2.sourcefilter='0'
uci set network.wan2.delegate='0'
uci set network.wan2_pppoe_device='device'
uci set network.wan2_pppoe_device.name='pppoe-wan2'
uci set network.wan2_pppoe_device.macaddr='$PPPOE_WAN_MAC_2'
uci set network.wan2_pppoe_device.ipv6='0'
uci commit network

# WAN2 has no DHCP service
uci set dhcp.wan2=dhcp
uci set dhcp.wan2.interface='wan2'
uci set dhcp.wan2.ignore='1'
uci commit dhcp

# Add WAN2 to firewall wan zone
uci -q del_list "$WAN_ZONE.network=wan2"
uci add_list "$WAN_ZONE.network=wan2"
uci commit firewall
