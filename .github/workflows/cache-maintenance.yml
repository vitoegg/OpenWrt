name: Cache-Maintenance

on:
  workflow_dispatch:
    inputs:
      wrt_branch:
        description: 'ImmortalWrt Branch'
        required: false
        type: choice
        default: openwrt-25.12
        options:
          - openwrt-25.12
          - openwrt-24.10
          - master
  schedule:
    - cron: 0 2 * * 0

permissions:
  actions: write
  contents: write

concurrency:
  group: "cache-maintenance-${{ github.ref_name }}-${{ inputs.wrt_branch || 'openwrt-25.12' }}"
  cancel-in-progress: true

env:
  WRT_BRANCH: ${{ inputs.wrt_branch || 'openwrt-25.12' }}
  WRT_REPO: https://github.com/immortalwrt/immortalwrt.git
  ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWORD: ${{ secrets.PPPOE_PASSWORD }}
  PPPOE_MAC: ${{ secrets.PPPOE_MAC }}
  PPPOE_WAN_MAC: ${{ secrets.PPPOE_WAN_MAC }}
  VLAN_ID: ${{ secrets.VLAN_ID }}
  ENABLE_DUAL_WAN: 'false'
  ROUTER_MAC: ${{ secrets.ROUTER_MAC }}
  LMINI_MAC: ${{ secrets.LMINI_MAC }}
  REDIRECT_SRC_DPORT: ${{ secrets.REDIRECT_SRC_DPORT }}
  REDIRECT_DEST_PORT: ${{ secrets.REDIRECT_DEST_PORT }}
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
  REPO_URL: ${{ secrets.REPO_URL }}

jobs:
  warm-cache:
    name: Cache Maintenance
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      BASH_ENV: /tmp/router-ci.log.env
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          cat > "$BASH_ENV" <<'EOF'
          CI_SEPARATOR='══════════════════════════════════════════════════'

          ci_banner() {
            local color="$1"
            printf '\033[%sm%s\033[0m\n' "$color" "$CI_SEPARATOR"
          }

          ci_emit() {
            local banner_color="$1"
            local text_color="$2"
            local icon="$3"
            shift 3
            if [ -n "$banner_color" ]; then
              ci_banner "$banner_color"
            fi
            printf '\033[%sm%s %s\033[0m\n' "$text_color" "$icon" "$*"
          }

          ci_success_banner() { ci_banner '32'; }
          ci_section() { ci_emit '32' '36' '●' "$*"; }
          ci_highlight() { ci_emit '32' '36' '✓' "$*"; }
          ci_success() { ci_emit '' '32' '✓' "$*"; }
          ci_success_section() { ci_emit '32' '32' '✓' "$*"; }
          ci_warn() { ci_emit '' '33' '⚠' "$*"; }
          ci_warn_section() { ci_emit '33' '33' '⚠' "$*"; }
          ci_error() { ci_emit '' '31' '✗' "$*"; }

          cache_state() {
            case "$1" in
              true)
                printf 'exact-hit'
                ;;
              false)
                printf 'restore-hit'
                ;;
              *)
                printf 'miss'
                ;;
            esac
          }
          EOF

          echo "::group::System snapshot"
          lscpu | grep -E 'name|Core|Thread'
          free -h
          df -Th
          uname -a
          echo "::endgroup::"

          echo "::group::Free disk space"
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile
          sudo docker image prune -a -f || true
          sudo systemctl stop docker || true
          sudo snap set system refresh.retain=2 || true
          sudo apt-get -y purge firefox clang* gcc-12 gcc-14 ghc* google* llvm* mono* mongo* mysql* php* || true
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          sudo rm -rf /etc/mysql /etc/php /usr/lib/{jvm,llvm} /usr/libexec/docker /usr/local /usr/src/* \
            /var/lib/docker /var/lib/gems /var/lib/mysql /var/lib/snapd /etc/skel \
            /opt/{microsoft,az,hostedtoolcache,cni,mssql-tools,pipx} \
            /usr/share/{az*,dotnet,swift,miniconda,gradle*,java,kotlinc,ri,sbt} \
            /root/{.sbt,.local,.npm} /usr/libexec/gcc/x86_64-linux-gnu/14 \
            /usr/lib/x86_64-linux-gnu/{*clang*,*LLVM*} /home/linuxbrew
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile} || true
          rm -rf ~/{.cargo,.dotnet,.rustup}
          df -Th
          echo "::endgroup::"

          echo "::group::Create swap"
          sudo fallocate -l 8G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h | grep -i swap
          echo "::endgroup::"

          echo "::group::Install build dependencies"
          sudo -E apt -yqq update
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev ccache jq unzip wget \
            libelf-dev libdw-dev libbz2-dev liblzma-dev libzstd-dev
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          echo "::endgroup::"

          echo "::group::Create workspace"
          mnt_size=$(df -BG /mnt | awk 'END {gsub(/G/, "", $4); print $4}')
          root_size=$(df -BG / | awk 'END {gsub(/G/, "", $4); print $4 - 2}')
          sudo truncate -s "${mnt_size}G" /mnt/mnt.img
          sudo truncate -s "${root_size}G" /root.img
          loop_mnt=$(sudo losetup -f --show /mnt/mnt.img)
          loop_root=$(sudo losetup -f --show /root.img)
          sudo pvcreate "$loop_mnt"
          sudo pvcreate "$loop_root"
          sudo vgcreate github "$loop_mnt" "$loop_root"
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R "$USER:$(id -gn)" /builder
          rm -rf "$GITHUB_WORKSPACE/wrt"
          ln -s /builder "$GITHUB_WORKSPACE/wrt"
          df -Th
          echo "::endgroup::"

          echo "::group::Init build context"
          echo "BUILD_DATE=$(TZ=Asia/Shanghai date +'%y.%m.%d')" >> "$GITHUB_ENV"
          find ./Router -maxdepth 3 -type f -iregex '.*\(txt\|sh\)$' -exec dos2unix {} \; -exec chmod +x {} \;
          echo "::endgroup::"

          ci_success_section "Runner ready"

      - name: Clone Source and Feeds
        run: |
          echo "::group::Clone source"
          git clone --depth=1 --single-branch --branch "$WRT_BRANCH" "$WRT_REPO" ./wrt
          cd ./wrt

          wrt_hash=$(git log -1 --format='%H')
          echo "WRT_HASH=$wrt_hash" >> "$GITHUB_ENV"

          project_mirrors_file="./scripts/projectsmirrors.json"
          if [ -f "$project_mirrors_file" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$project_mirrors_file"
          fi

          echo "::endgroup::"
          ci_highlight "Upstream commit: $wrt_hash"

          echo "::group::Update feeds"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "::endgroup::"
          ci_success_section "Feeds ready"

      - name: Apply Customizations
        working-directory: ./wrt
        run: |
          "$GITHUB_WORKSPACE/Router/Scripts/Packages.sh"
          "$GITHUB_WORKSPACE/Router/Scripts/Prepare.sh"
          ci_success_section "Sources prepared"

          cat "$GITHUB_WORKSPACE/Router/Config/General.txt" >> .config
          cat "$GITHUB_WORKSPACE/Router/Config/Custom.txt" >> .config
          "$GITHUB_WORKSPACE/Router/Scripts/Settings.sh"

          echo "::group::make defconfig"
          make defconfig -j"$(nproc)"
          echo "::endgroup::"
          ci_success_section "Router config applied"

          hash_paths() {
            local path file
            local found=0
            local hash_file
            hash_file=$(mktemp)

            for path in "$@"; do
              [ -e "$path" ] || continue
              if [ -d "$path" ]; then
                while IFS= read -r -d '' file; do
                  sha256sum "$file" >> "$hash_file"
                  found=1
                done < <(find "$path" -type f -print0 | sort -z)
              else
                sha256sum "$path" >> "$hash_file"
                found=1
              fi
            done

            if [ "$found" -eq 1 ]; then
              sha256sum "$hash_file" | cut -c1-16
            else
              printf 'none'
            fi

            rm -f "$hash_file"
          }

          target_board=$(sed -n 's/^CONFIG_TARGET_BOARD="\([^"]*\)"/\1/p' .config | head -1)
          target_subtarget=$(sed -n 's/^CONFIG_TARGET_SUBTARGET="\([^"]*\)"/\1/p' .config | head -1)

          if [ -z "$target_board" ]; then
            target_board='x86'
          fi
          if [ -z "$target_subtarget" ]; then
            target_subtarget='64'
          fi

          toolchain_sig=$(hash_paths \
            ./toolchain \
            ./tools \
            ./include/toolchain*.mk \
            "./target/linux/$target_board" \
            ./feeds/packages/lang/golang)
          cache_run_suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          dl_cache_prefix="wrt-dl-${WRT_BRANCH}"
          toolchain_cache_prefix="toolchain-${WRT_BRANCH}-${target_board}-${target_subtarget}-${toolchain_sig}"

          echo "TARGET_BOARD=$target_board" >> "$GITHUB_ENV"
          echo "TARGET_SUBTARGET=$target_subtarget" >> "$GITHUB_ENV"
          echo "TOOLCHAIN_SIG=$toolchain_sig" >> "$GITHUB_ENV"
          echo "DL_CACHE_PREFIX=$dl_cache_prefix" >> "$GITHUB_ENV"
          echo "DL_CACHE_KEY=${dl_cache_prefix}-${cache_run_suffix}" >> "$GITHUB_ENV"
          echo "TOOLCHAIN_CACHE_PREFIX=$toolchain_cache_prefix" >> "$GITHUB_ENV"
          echo "TOOLCHAIN_CACHE_KEY=${toolchain_cache_prefix}-${cache_run_suffix}" >> "$GITHUB_ENV"

          ci_success_banner
          ci_success "Target detected: ${target_board}/${target_subtarget}"
          ci_success "Toolchain signature: ${toolchain_sig}"

      - name: Restore Download Cache
        id: cache-dl-restore
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.DL_CACHE_KEY }}
          restore-keys: |
            ${{ env.DL_CACHE_PREFIX }}-
          path: ./wrt/dl

      - name: Restore Toolchain Cache
        id: cache-toolchain-restore
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.TOOLCHAIN_CACHE_KEY }}
          restore-keys: |
            ${{ env.TOOLCHAIN_CACHE_PREFIX }}-
          path: |
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Warm Download Cache
        working-directory: ./wrt
        run: |
          report_cache() {
            local label="$1" state="$2"
            if [ "$state" = 'miss' ]; then
              ci_warn "${label} cache: ${state}"
            else
              ci_success "${label} cache: ${state}"
            fi
          }

          dl_state=$(cache_state '${{ steps.cache-dl-restore.outputs.cache-hit }}')
          toolchain_state=$(cache_state '${{ steps.cache-toolchain-restore.outputs.cache-hit }}')

          report_cache 'Download' "$dl_state"
          report_cache 'Toolchain' "$toolchain_state"

          echo "::group::Restore cache timestamps"
          if [ -d "./staging_dir" ]; then
            find ./staging_dir -type d -name stamp -not -path '*target*' | while read -r dir; do
              find "$dir" -type f -exec touch {} +
            done
            mkdir -p ./tmp
            echo '1' > ./tmp/.build
          fi
          echo "::endgroup::"

          list_suspicious_files() {
            find dl -maxdepth 1 -type f -size -1024c | sort
          }

          count_suspicious_files() {
            list_suspicious_files | wc -l | tr -d ' '
          }

          download_jobs=$(( $(nproc) * 2 ))
          if [ "$download_jobs" -gt 16 ]; then
            download_jobs=16
          fi

          ci_section "Downloading source archives"
          echo "::group::Download source archives"
          make download -j"$download_jobs"
          echo "::endgroup::"

          bad_files=$(count_suspicious_files)
          if [ "$bad_files" -gt 0 ]; then
            ci_warn "Found ${bad_files} suspicious root-level download files smaller than 1 KB"
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              ls -l "$file"
              rm -f "$file"
            done < <(list_suspicious_files)

            echo "::group::Retry source archives download"
            make download -j"$download_jobs"
            echo "::endgroup::"

            remaining_bad_files=$(count_suspicious_files)
            if [ "$remaining_bad_files" -gt 0 ]; then
              while IFS= read -r file; do
                [ -n "$file" ] || continue
                ls -l "$file"
              done < <(list_suspicious_files)
              ci_error "Download retry still found ${remaining_bad_files} suspicious root-level files smaller than 1 KB"
              exit 1
            fi

            ci_warn "Suspicious files removed and successfully re-downloaded"
          else
            ci_success "All downloaded source archives look valid"
          fi

      - name: Warm Toolchain Cache
        working-directory: ./wrt
        run: |
          ci_section "Starting parallel toolchain warm-up with $(nproc) jobs"
          toolchain_failed=false
          echo "::group::Parallel toolchain output"
          if ! make -j"$(nproc)" tools/install toolchain/install; then
            toolchain_failed=true
          fi
          echo "::endgroup::"

          if [ "$toolchain_failed" = true ]; then
            ci_warn_section "Parallel toolchain warm-up failed, retrying with make -j1 V=s"
            echo "::group::Verbose toolchain retry"
            make -j1 V=s tools/install toolchain/install
            echo "::endgroup::"

            ci_warn_section "Toolchain cache warmed after verbose retry"
          else
            ci_success_section "Toolchain cache warmed on the first pass"
          fi

      - name: Save Download Cache
        id: cache-dl-save
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          key: ${{ env.DL_CACHE_KEY }}
          path: ./wrt/dl

      - name: Save Toolchain Cache
        id: cache-toolchain-save
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          key: ${{ env.TOOLCHAIN_CACHE_KEY }}
          path: |
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Purge Stale Caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          purge_cache_family() {
            local label="$1"
            local prefix="$2"
            local keep_key="$3"
            local save_outcome="$4"
            local stale_ids

            if [ "$save_outcome" != 'success' ]; then
              ci_warn "${label} cache save skipped or failed, keeping previous cache"
              return 0
            fi

            ci_success "${label} cache saved: ${keep_key}"

            stale_ids=$(gh cache list --key "${prefix}-" --json id,key | \
              jq -r --arg keep_key "$keep_key" '.[] | select(.key != $keep_key) | .id')

            if [ -z "$stale_ids" ]; then
              ci_success "No stale ${label} caches to purge"
              return 0
            fi

            while IFS= read -r cache_id; do
              [ -n "$cache_id" ] || continue
              gh cache delete "$cache_id" >/dev/null 2>&1 || true
            done <<< "$stale_ids"

            ci_success "Old ${label} caches purged"
          }

          purge_cache_family 'Download' "${DL_CACHE_PREFIX}" "${DL_CACHE_KEY}" '${{ steps.cache-dl-save.outcome }}'
          purge_cache_family 'Toolchain' "${TOOLCHAIN_CACHE_PREFIX}" "${TOOLCHAIN_CACHE_KEY}" '${{ steps.cache-toolchain-save.outcome }}'

      - name: Setup Rclone
        if: always()
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Check Drive Capacity
        if: always()
        run: "rclone about remote:"

      - name: Clean Up
        if: always()
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          out_log: false
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0
          workflows_keep_keyword: "Build"
