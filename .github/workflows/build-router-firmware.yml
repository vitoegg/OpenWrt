name: Build-Router-Firmware

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Select Build Mode'
        required: false
        type: choice
        default: 'ImageBuilder'
        options:
          - 'ImageBuilder'
          - 'FullBuilder'
      wan_mode:
        description: 'Select Target WAN Mode'
        required: false
        type: choice
        default: 'Dual WAN'
        options:
          - 'Single WAN'
          - 'Dual WAN'

permissions:
  actions: write
  contents: write

concurrency:
  group: "build-router-firmware-${{ github.ref_name }}"
  cancel-in-progress: true

env:
  BUILD_PROFILE: Router
  ENABLE_DUAL_WAN: ${{ inputs.wan_mode == 'Dual WAN' }}
  ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWORD: ${{ secrets.PPPOE_PASSWORD }}
  PPPOE_MAC: ${{ secrets.PPPOE_MAC }}
  PPPOE_WAN_MAC: ${{ secrets.PPPOE_WAN_MAC }}
  VLAN_ID: ${{ secrets.VLAN_ID }}
  PPPOE_USERNAME_2: ${{ secrets.PPPOE_USERNAME_2 }}
  PPPOE_PASSWORD_2: ${{ secrets.PPPOE_PASSWORD_2 }}
  PPPOE_MAC_2: ${{ secrets.PPPOE_MAC_2 }}
  PPPOE_WAN_MAC_2: ${{ secrets.PPPOE_WAN_MAC_2 }}
  VLAN_ID_2: ${{ secrets.VLAN_ID_2 }}
  ROUTER_MAC: ${{ secrets.ROUTER_MAC }}
  SWITCH_MAC: ${{ secrets.SWITCH_MAC }}
  REDIRECT_SRC_DPORT: ${{ secrets.REDIRECT_SRC_DPORT }}
  REDIRECT_DEST_PORT: ${{ secrets.REDIRECT_DEST_PORT }}
  DNS_FALLBACK_SERVER: ${{ secrets.DNS_FALLBACK_SERVER }}
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
  REPO_URL: ${{ secrets.REPO_URL }}

jobs:
  build:
    name: Build Router Firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      BASH_ENV: /tmp/router-ci.log.env
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" prepare-environment
      - name: Setup Rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Select Build Mode
        env:
          REQUESTED_BUILD_MODE: ${{ inputs.build_mode }}
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" select-build-mode
      - name: Clone Source and Feeds
        if: env.BUILD_MODE == 'FullBuilder'
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" clone-source-and-feeds
      - name: Apply Customizations
        if: env.BUILD_MODE == 'FullBuilder'
        working-directory: ./wrt
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" apply-customizations
      - name: Restore Download Cache
        if: env.BUILD_MODE == 'FullBuilder'
        id: cache-dl-restore
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.DL_CACHE_KEY }}
          restore-keys: |
            ${{ env.DL_CACHE_PREFIX }}-
          path: ./wrt/dl

      - name: Restore Toolchain Cache
        if: env.BUILD_MODE == 'FullBuilder'
        id: cache-toolchain-restore
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.TOOLCHAIN_CACHE_KEY }}
          restore-keys: |
            ${{ env.TOOLCHAIN_CACHE_PREFIX }}-
          path: |
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Restore Ccache
        if: env.BUILD_MODE == 'FullBuilder'
        id: cache-ccache-restore
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.CCACHE_CACHE_KEY }}
          restore-keys: |
            ${{ env.CCACHE_CACHE_PREFIX }}-
          path: ./wrt/.ccache

      - name: Download Sources
        if: env.BUILD_MODE == 'FullBuilder'
        working-directory: ./wrt
        env:
          DOWNLOAD_CACHE_HIT: ${{ steps.cache-dl-restore.outputs.cache-hit }}
          TOOLCHAIN_CACHE_HIT: ${{ steps.cache-toolchain-restore.outputs.cache-hit }}
          CCACHE_CACHE_HIT: ${{ steps.cache-ccache-restore.outputs.cache-hit }}
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" download-sources
      - name: Save Download Cache
        if: env.BUILD_MODE == 'FullBuilder'
        id: cache-dl-save
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          key: ${{ env.DL_CACHE_KEY }}
          path: ./wrt/dl

      - name: Compile Firmware
        if: env.BUILD_MODE == 'FullBuilder'
        working-directory: ./wrt
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" compile-fullbuilder
      - name: Build Firmware with ImageBuilder
        if: env.BUILD_MODE == 'ImageBuilder'
        working-directory: ./wrt
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" assemble-imagebuilder
      - name: Save Toolchain Cache
        id: cache-toolchain-save
        if: env.BUILD_MODE == 'FullBuilder' && env.BUILD_OK == 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          key: ${{ env.TOOLCHAIN_CACHE_KEY }}
          path: |
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Save Ccache
        id: cache-ccache-save
        if: env.BUILD_MODE == 'FullBuilder' && env.BUILD_OK == 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          key: ${{ env.CCACHE_CACHE_KEY }}
          path: ./wrt/.ccache

      - name: Publish ImageBuilder
        if: env.BUILD_MODE == 'FullBuilder' && env.BUILD_OK == 'true'
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" publish-imagebuilder
      - name: Purge Stale Caches
        if: always() && env.BUILD_MODE == 'FullBuilder'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOWNLOAD_CACHE_SAVE_OUTCOME: ${{ steps.cache-dl-save.outcome }}
          TOOLCHAIN_CACHE_SAVE_OUTCOME: ${{ steps.cache-toolchain-save.outcome }}
          CCACHE_CACHE_SAVE_OUTCOME: ${{ steps.cache-ccache-save.outcome }}
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" purge-stale-caches
      - name: Deliver Firmware
        if: env.BUILD_OK == 'true'
        working-directory: ./wrt
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIRMWARE_DOWNLOAD_URL: ${{ secrets.FIRMWARE_DOWNLOAD_URL }}
        run: bash "$GITHUB_WORKSPACE/Build/Action/BuildFirmware.sh" deliver-firmware
      - name: Clean Up
        if: always()
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          out_log: false
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0
          workflows_keep_keyword: "Cloud/Rclone/Patches"
