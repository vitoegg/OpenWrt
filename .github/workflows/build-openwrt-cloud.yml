name: Build-OpenWrt-Cloud

on:
  workflow_dispatch:

# Scheduled trigger compilation
  schedule:
    - cron: 0 5 6 6 *

env:
  DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
  ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWORD: ${{ secrets.PPPOE_PASSWORD }}
  PPPOE_MAC: ${{ secrets.PPPOE_MAC }}
  ROUTER_MAC: ${{ secrets.ROUTER_MAC }}
  LMINI_MAC: ${{ secrets.LMINI_MAC }}
  UPDATE_SH_URL: ${{ secrets.UPDATE_SH_URL }}
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
  REPO_URL: ${{ secrets.REPO_URL }}
  DDNS_SH_URL: ${{ secrets.DDNS_SH_URL }}
  HARDWARE_MODEL: MINISFORUM UN100D
  WORKDIR: /builder

permissions: write-all

jobs:
  build:
    name: Build OpenWrt Cloud
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    defaults:
      run:
        shell: bash

    steps:
    - name: Sync Upstream Repository
      run: |
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/vitoegg/OpenLite/merge-upstream \
          -d '{"branch":"main"}')
        
        if echo "$RESPONSE" | grep -qi "Successfully"; then
          echo "✅ Synced: Updated from upstream"
        elif echo "$RESPONSE" | grep -qi "not behind"; then
          echo "ℹ️ No sync needed: Already up-to-date"
        else
          MESSAGE=$(echo "$RESPONSE" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
          echo "::warning::Upstream sync failed: ${MESSAGE:-Unknown response}"
        fi

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Timezone
      run: sudo timedatectl set-timezone 'Asia/Shanghai'

    - name: Show System Info
      run: |
        lscpu | grep -E 'name|Core|Thread'
        free -h
        df -Th
        uname -a


    - name: Free Disk Space
      run: |
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        sudo docker image prune -a -f
        sudo systemctl stop docker
        sudo snap set system refresh.retain=2
        sudo apt-get -y purge firefox clang* gcc-12 gcc-14 ghc* google* llvm* mono* mongo* mysql* php*
        sudo apt-get -y autoremove --purge
        sudo apt-get clean
        sudo rm -rf /etc/mysql /etc/php /usr/lib/{jvm,llvm} /usr/libexec/docker /usr/local /usr/src/* \
          /var/lib/docker /var/lib/gems /var/lib/mysql /var/lib/snapd /etc/skel \
          /opt/{microsoft,az,hostedtoolcache,cni,mssql-tools,pipx} \
          /usr/share/{az*,dotnet,swift,miniconda,gradle*,java,kotlinc,ri,sbt} \
          /root/{.sbt,.local,.npm} /usr/libexec/gcc/x86_64-linux-gnu/14 \
          /usr/lib/x86_64-linux-gnu/{*clang*,*LLVM*} /home/linuxbrew
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        rm -rf ~/{.cargo,.dotnet,.rustup}
        df -Th

    - name: Create Swap
      run: |
        sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        free -h | grep -i swap

    - name: Build System Setup
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential flex bison cmake g++ gawk gcc-multilib g++-multilib gettext git libfuse-dev libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-pyelftools rsync unzip zlib1g-dev file wget subversion patch upx-ucl autoconf automake curl asciidoc binutils bzip2 lib32gcc-s1 libc6-dev-i386 uglifyjs msmtp texinfo libreadline-dev libglib2.0-dev xmlto libelf-dev libtool autopoint antlr3 gperf ccache swig coreutils haveged scons libpython3-dev rename qemu-utils \
          dos2unix jq python3-netifaces libdw-dev libbz2-dev liblzma-dev libzstd-dev
        sudo apt-get clean
        git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com'

    - name: Create VG & LV
      run: |
        mnt_size=$(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//')
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 2)
        sudo truncate -s "$mnt_size"G /mnt/mnt.img
        sudo truncate -s "$root_size"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner

    - name: Mount LV
      run: |
        sudo mkdir -p /builder
        sudo mount /dev/github/runner /builder
        sudo chown -R runner:runner /builder
        df -Th

    - name: Initialization Values
      run: |
        echo "BUILD_START_TIME=$(date +%s)" >> "$GITHUB_ENV"
        echo "TAG_TIME=$(TZ=UTC-8 date +"%Y%m%d-%H%M")" >> "$GITHUB_ENV"

    - name: Compile OpenWrt
      working-directory: /builder
      id: compile
      continue-on-error: true
      run: |
        export GITHUB_REPO=vitoegg/OpenLite
        export LAN=192.168.10.2
        # Download and replace build.sh
        curl -sS https://raw.githubusercontent.com/vitoegg/OpenLite/main/openwrt/build.sh -o build.sh
        sed -i 's|https://\$mirror/openwrt/23-config-musl-x86|https://raw.githubusercontent.com/vitoegg/OpenWrt/main/Cloud/23-config-musl-x86|g' build.sh
        sed -i 's|https://\$mirror/openwrt/23-config-common-custom|https://raw.githubusercontent.com/vitoegg/OpenWrt/main/Cloud/23-config-common-custom|g' build.sh
        sed -i 's|https://\$mirror/openwrt/23-config-common-server|https://raw.githubusercontent.com/vitoegg/OpenWrt/main/Cloud/23-config-common-server|g' build.sh
        sed -i 's|https://\$mirror/openwrt/scripts/06-custom.sh|https://raw.githubusercontent.com/vitoegg/OpenWrt/main/Cloud/06-custom.sh|g' build.sh
        # Build
        bash build.sh server x86_64 | tee build.log

    - name: Verbose Retry on Failure
      working-directory: /builder
      id: retry
      if: steps.compile.outcome == 'failure'
      continue-on-error: true
      run: |
        cd openwrt
        make -j1 V=s

    - name: Fail Workflow if Build Failed
      if: steps.compile.outcome == 'failure' && (steps.retry.outcome == 'failure' || steps.retry.outcome == 'skipped')
      run: |
        echo "❌ Build failed: both compile and retry steps failed"
        exit 1

    - name: Set Compiled ENV
      working-directory: /builder
      if: steps.compile.outcome == 'success' || steps.retry.outcome == 'success'
      run: |
        KERNEL=$(grep -oE 'Kernel: [0-9]+(\.[0-9]+)+(-[0-9]+)?' build.log | head -1 | awk '{print $2}' | grep -oE '^[0-9]+(\.[0-9]+)+')
        echo "KERNEL_PATCHVER=$KERNEL" >> "$GITHUB_ENV"

        LUCI=$(grep -oE 'Building v[0-9]+(\.[0-9]+)+' build.log | head -1 | awk '{print $2}' | grep -oE '[0-9]+\.[0-9]+')
        echo "LUCI_VERSION=$LUCI" >> "$GITHUB_ENV"

        BUILD_END_TIME=$(date +%s)
        BUILD_TIME=$((BUILD_END_TIME - BUILD_START_TIME))
        BUILD_HOURS=$((BUILD_TIME / 3600))
        BUILD_MINUTES=$(((BUILD_TIME % 3600) / 60))
        if [ "$BUILD_HOURS" -gt 0 ]; then
          BUILD_DURATION="${BUILD_HOURS}h${BUILD_MINUTES}min"
        else
          BUILD_DURATION="${BUILD_MINUTES}min"
        fi
        echo "BUILD_DURATION=$BUILD_DURATION" >> "$GITHUB_ENV"

    - name: Prepare Firmware Files
      working-directory: /builder
      if: steps.compile.outcome == 'success' || steps.retry.outcome == 'success'
      run: |
        mkdir -p firmware
        cp -a openwrt/bin/targets/x86/*/*-squashfs-combined-efi.img.gz firmware/openwrt-server-${{ env.TAG_TIME }}-x86-64-efi.img.gz

    - name: Upload to WebDAV
      uses: bxb100/action-upload@main
      if: steps.compile.outcome == 'success' || steps.retry.outcome == 'success'
      with:
        provider: webdav
        provider_options: |
          endpoint=${{ secrets.WEBDAV_ENDPOINT }}
          username=${{ secrets.WEBDAV_USERNAME }}
          password=${{ secrets.WEBDAV_PASSWORD }}
          root=/OpenWrt/
        include: '${{ env.WORKDIR }}/firmware/*'

    - name: Send Telegram Message
      if: steps.compile.outcome == 'success' || steps.retry.outcome == 'success'
      run: |
        curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d photo="https://mirror.1991991.xyz/Picture/openwrt.webp" \
          --data-urlencode "caption=#OpenWRT #HomeCloud #Server

          *🎉 Ready to roll! Dive in! 🎉*

          - 🛠 Hardware: ${{ env.HARDWARE_MODEL }}

          - 🌐 Kernel: ${{ env.KERNEL_PATCHVER }}

          - 📦 LuCI: ${{ env.LUCI_VERSION }}

          - ⌛ Build Duration: ${{ env.BUILD_DURATION }}

          - 🔗 Firmware: [Click to View](${{ secrets.FIRMWARE_DOWNLOAD_URL }})" \
          -d parse_mode=Markdown >/dev/null 2>&1

    - name: Delete old Releases and Workflows
      if: always()
      uses: ophub/delete-releases-workflows@main
      with:
        gh_token: ${{ secrets.GITHUB_TOKEN }}
        delete_releases: true
        releases_keep_latest: 0
        delete_tags: true
        delete_workflows: true
        workflows_keep_day: 0