name: OpenWrt-Lean-5.10

on:
  workflow_dispatch:

# 定时触发编译(每月28日凌晨4点)
#  schedule:
#    - cron: 0 20 28 * *

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: Lean/.config
  DIY_P_SH: Lean/customize.sh
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-18.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main

    - name: 准备编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-1804)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: 克隆Lean源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: 更新feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 添加自定义信息
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P_SH
        
    - name: 下载固件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: 执行编译
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "::set-output name=status::success"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    - name: 检查存储空间
      if: (!cancelled())
      run: df -hT

    - name: 整理固件文件
      id: organize
      run: |
        mkdir -p ./artifact/firmware
        rm -rf $(find openwrt/bin/targets/ -type d -name "packages")
        cp -rf $(find openwrt/bin/targets/ -type f -name "*squashfs*combined*efi.img*") ./artifact/firmware/
        echo "::set-output name=status::success"
        
    - name: 上传固件文件
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' 
      with:
        name: Lean_X86_64${{ env.FILE_DATE }}
        path:  ./artifact/firmware/
        
    - name: Telegram通知
      uses: appleboy/telegram-action@master
      if: steps.organize.outputs.status == 'success'
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          -------------------------------------------------
          -- X86_64 --
          🎉Openwrt-Lean固件编译成功🎉 
          -- V5.10.* --
          -------------------------------------------------
          🎈 编译时间：${{ env.FILE_DATE1 }}
          🌴 发布地址：https://github.com/vitoegg/OpenWrt/actions
