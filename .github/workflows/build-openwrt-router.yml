name: Build-OpenWrt-Router

on:
  workflow_dispatch:
    inputs:
      wrt_branch:
        description: ImmortalWrt Branch
        required: false
        type: choice
        default: master
        options:
          - main
          - openwrt-25.12
          - openwrt-24.10
      wrt_commit:
        description: Optional pinned ImmortalWrt commit
        required: false
        type: string
        default: ''
      wan_mode:
        description: WAN Mode
        required: false
        type: choice
        default: Single WAN
        options:
          - Single WAN
          - Dual WAN
      upload_enable:
        description: Upload firmware to WebDAV
        required: false
        type: boolean
        default: true
      telegram_enable:
        description: Send Telegram notification
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '0 8 6 6 *'
    - cron: '0 8 12 12 *'

permissions: write-all

env:
  WRT_REPO: https://github.com/openwrt/openwrt.git
  WRT_BRANCH: ${{ inputs.wrt_branch || 'main' }}
  WRT_COMMIT: ${{ inputs.wrt_commit || '' }}
  ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWORD: ${{ secrets.PPPOE_PASSWORD }}
  PPPOE_MAC: ${{ secrets.PPPOE_MAC }}
  VLAN_ID: ${{ secrets.VLAN_ID }}
  ENABLE_DUAL_WAN: ${{ inputs.wan_mode == 'Dual WAN' && 'true' || 'false' }}
  PPPOE_USERNAME_2: ${{ secrets.PPPOE_USERNAME_2 }}
  PPPOE_PASSWORD_2: ${{ secrets.PPPOE_PASSWORD_2 }}
  PPPOE_MAC_2: ${{ secrets.PPPOE_MAC_2 }}
  VLAN_ID_2: ${{ secrets.VLAN_ID_2 }}
  ROUTER_MAC: ${{ secrets.ROUTER_MAC }}
  LMINI_MAC: ${{ secrets.LMINI_MAC }}
  REDIRECT_SRC_DPORT: ${{ secrets.REDIRECT_SRC_DPORT }}
  REDIRECT_DEST_PORT: ${{ secrets.REDIRECT_DEST_PORT }}
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
  REPO_URL: ${{ secrets.REPO_URL }}
  HARDWARE_MODEL: MINISFORUM UN100D
  WEBDAV_ENDPOINT: ${{ secrets.WEBDAV_ENDPOINT }}
  WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
  WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  FIRMWARE_DOWNLOAD_URL: ${{ secrets.FIRMWARE_DOWNLOAD_URL }}
  ROUTER_SCRIPT_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/Router/Scripts
  ROUTER_HOOK_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/Router/hooks

jobs:
  build:
    name: Build OpenWrt Router
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Set timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date +"%Y-%m-%d %H:%M:%S %Z"

      - name: Display system info
        run: |
          date +"%Y-%m-%d %H:%M:%S %Z"
          lscpu | grep -E '^Architecture|^CPU\(s\):|^Model name'
          uname -sr
          lsb_release -a
          free -h
          df -Th

      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Router inputs
        run: |
          test -f builder/config.buildinfo
          test -f Router/hooks/prepare-compile.sh
          test -f Router/hooks/prepare-configure.sh
          test -f Router/hooks/prepare-image.sh
          ls -la builder
          ls -la Router/hooks

      - name: Initialize build values
        run: |
          echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "TAG_TIME=$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"

      - name: Build
        id: build
        uses: apoiston/actions@image
        with:
          repo_url: ${{ env.WRT_REPO }}
          repo_branch: ${{ env.WRT_BRANCH }}
          private_key: ${{ secrets.PRIVATE_KEY }}
          public_key: ${{ secrets.PUBLIC_KEY }}
          prepare_compile: ${{ env.ROUTER_HOOK_BASE_URL }}/prepare-compile.sh
          prepare_configure: ${{ env.ROUTER_HOOK_BASE_URL }}/prepare-configure.sh
          prepare_image: ${{ env.ROUTER_HOOK_BASE_URL }}/prepare-image.sh
          config_buildinfo: builder/config.buildinfo
          enable_prebuilt_tools: true
          enable_build_toolchain: true
          enable_build_kernel: true
          enable_build_everything: true
          enable_prepare_image: true

      - name: Collect build metadata
        if: success()
        run: |
          BUILD_END_EPOCH=$(date +%s)
          BUILD_SECONDS=$((BUILD_END_EPOCH - BUILD_START_EPOCH))
          BUILD_HOURS=$((BUILD_SECONDS / 3600))
          BUILD_MINUTES=$(((BUILD_SECONDS % 3600) / 60))
          BUILD_REMAINING_SECONDS=$((BUILD_SECONDS % 60))
          echo "BUILD_DURATION=${BUILD_HOURS}h ${BUILD_MINUTES}m ${BUILD_REMAINING_SECONDS}s" >> "$GITHUB_ENV"

          KERNEL_VER=$(sed -n 's/^linux_kernel.version: //p' openwrt/upload/kernel.buildinfo 2>/dev/null | head -n 1)
          if [ -z "$KERNEL_VER" ]; then
            MANIFEST=$(find openwrt/upload -maxdepth 1 -type f -name '*.manifest' | head -n 1)
            if [ -n "$MANIFEST" ]; then
              KERNEL_VER=$(awk -F' - ' '/^kernel - / { print $2; exit }' "$MANIFEST")
            fi
          fi
          echo "KERNEL_PATCHVER=${KERNEL_VER:-unknown}" >> "$GITHUB_ENV"

          LUCI_VER=$(find openwrt/upload -maxdepth 1 -type f -name '*.manifest' -exec awk -F' - ' '/^luci-base - / { print $2; exit }' {} \; | head -n 1)
          if [ -z "$LUCI_VER" ]; then
            LUCI_VER=$(git -C openwrt/feeds/luci log -1 --format='%cd' --date=format:'%Y-%m-%d' 2>/dev/null || echo 'unknown')
          fi
          echo "LUCI_VERSION=${LUCI_VER:-unknown}" >> "$GITHUB_ENV"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-router-${{ env.TAG_TIME }}
          path: openwrt/upload/
          if-no-files-found: error

      - name: Upload to WebDAV
        if: ${{ success() && env.WEBDAV_ENDPOINT != '' && (github.event_name != 'workflow_dispatch' || inputs.upload_enable) }}
        uses: bxb100/action-upload@main
        with:
          provider: webdav
          provider_options: |
            endpoint=${{ env.WEBDAV_ENDPOINT }}
            username=${{ env.WEBDAV_USERNAME }}
            password=${{ env.WEBDAV_PASSWORD }}
            root=/OpenWrt/
          include: '${{ github.workspace }}/openwrt/upload/*.img.gz'

      - name: Send Telegram message
        if: ${{ success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' && (github.event_name != 'workflow_dispatch' || inputs.telegram_enable) }}
        continue-on-error: true
        run: |
          curl "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d photo='https://mirror.1991991.xyz/Picture/openwrt.webp' \
            --data-urlencode "caption=#OpenWRT #HomeLab #Router

          *Ready to roll! Dive in!*

          - Hardware: ${HARDWARE_MODEL}

          - Kernel: ${KERNEL_PATCHVER}

          - LuCI: ${LUCI_VERSION}

          - Build Duration: ${BUILD_DURATION}

          - Firmware: [Click to View](${FIRMWARE_DOWNLOAD_URL})" \
            -d parse_mode=Markdown >/dev/null 2>&1

      - name: Delete old releases and workflows
        if: always()
        continue-on-error: true
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0
