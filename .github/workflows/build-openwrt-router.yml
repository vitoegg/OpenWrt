name: Build-OpenWrt-Router

on:
  workflow_dispatch:
    inputs:
      wan_mode:
        description: 'WAN Mode'
        required: false
        type: choice
        default: 'Dual WAN'
        options:
          - 'Single WAN'
          - 'Dual WAN'
      wrt_branch:
        description: 'ImmortalWrt Branch'
        required: false
        type: choice
        default: openwrt-25.12
        options:
          - openwrt-25.12
          - openwrt-24.10
          - master
      wrt_commit:
        description: 'ImmortalWrt Commit Hash'
        required: false
        type: string
        default: ''
  schedule:
    - cron: 0 8 6 6 *
    - cron: 0 8 12 12 *

permissions:
  actions: write
  contents: write

concurrency:
  group: "build-openwrt-router-${{ github.ref_name }}-${{ inputs.wan_mode || 'Dual WAN' }}"
  cancel-in-progress: true

env:
  WRT_BRANCH: ${{ inputs.wrt_branch || 'openwrt-25.12' }}
  WRT_COMMIT: ${{ inputs.wrt_commit || '' }}
  WRT_REPO: https://github.com/immortalwrt/immortalwrt.git
  DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
  ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWORD: ${{ secrets.PPPOE_PASSWORD }}
  PPPOE_MAC: ${{ secrets.PPPOE_MAC }}
  PPPOE_WAN_MAC: ${{ secrets.PPPOE_WAN_MAC }}
  VLAN_ID: ${{ secrets.VLAN_ID }}
  ENABLE_DUAL_WAN: ${{ inputs.wan_mode == 'Dual WAN' && 'true' || 'false' }}
  PPPOE_USERNAME_2: ${{ secrets.PPPOE_USERNAME_2 }}
  PPPOE_PASSWORD_2: ${{ secrets.PPPOE_PASSWORD_2 }}
  PPPOE_MAC_2: ${{ secrets.PPPOE_MAC_2 }}
  PPPOE_WAN_MAC_2: ${{ secrets.PPPOE_WAN_MAC_2 }}
  VLAN_ID_2: ${{ secrets.VLAN_ID_2 }}
  ROUTER_MAC: ${{ secrets.ROUTER_MAC }}
  LMINI_MAC: ${{ secrets.LMINI_MAC }}
  REDIRECT_SRC_DPORT: ${{ secrets.REDIRECT_SRC_DPORT }}
  REDIRECT_DEST_PORT: ${{ secrets.REDIRECT_DEST_PORT }}
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
  REPO_URL: ${{ secrets.REPO_URL }}
  HARDWARE_MODEL: MINISFORUM UN100D

jobs:
  build:
    name: Build OpenWrt Router
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}

    steps:
      - name: Checkout Projects
        uses: actions/checkout@v6

      - name: Bootstrap Runner
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "::group::System snapshot"
          lscpu | grep -E 'name|Core|Thread'
          free -h
          df -Th
          uname -a
          echo "::endgroup::"

          echo "::group::Free disk space"
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile
          sudo docker image prune -a -f || true
          sudo systemctl stop docker || true
          sudo snap set system refresh.retain=2 || true
          sudo apt-get -y purge firefox clang* gcc-12 gcc-14 ghc* google* llvm* mono* mongo* mysql* php* || true
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          sudo rm -rf /etc/mysql /etc/php /usr/lib/{jvm,llvm} /usr/libexec/docker /usr/local /usr/src/* \
            /var/lib/docker /var/lib/gems /var/lib/mysql /var/lib/snapd /etc/skel \
            /opt/{microsoft,az,hostedtoolcache,cni,mssql-tools,pipx} \
            /usr/share/{az*,dotnet,swift,miniconda,gradle*,java,kotlinc,ri,sbt} \
            /root/{.sbt,.local,.npm} /usr/libexec/gcc/x86_64-linux-gnu/14 \
            /usr/lib/x86_64-linux-gnu/{*clang*,*LLVM*} /home/linuxbrew
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile} || true
          rm -rf ~/{.cargo,.dotnet,.rustup}
          df -Th
          echo "::endgroup::"

          echo "::group::Create swap"
          sudo fallocate -l 8G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h | grep -i swap
          echo "::endgroup::"

          echo "::group::Install build dependencies"
          sudo -E apt -yqq update
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev ccache jq unzip wget \
            libelf-dev libdw-dev libbz2-dev liblzma-dev libzstd-dev
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          echo "::endgroup::"

      - name: Create Build Workspace
        run: |
          echo "::group::Create volume group"
          mnt_size=$(df -BG /mnt | awk 'END {gsub(/G/, "", $4); print $4}')
          root_size=$(df -BG / | awk 'END {gsub(/G/, "", $4); print $4 - 2}')
          sudo truncate -s "${mnt_size}G" /mnt/mnt.img
          sudo truncate -s "${root_size}G" /root.img
          loop_mnt=$(sudo losetup -f --show /mnt/mnt.img)
          loop_root=$(sudo losetup -f --show /root.img)
          sudo pvcreate "$loop_mnt"
          sudo pvcreate "$loop_root"
          sudo vgcreate github "$loop_mnt" "$loop_root"
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          echo "::endgroup::"

          echo "::group::Mount workspace"
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R "$USER:$(id -gn)" /builder
          rm -rf "$GITHUB_WORKSPACE/wrt"
          ln -s /builder "$GITHUB_WORKSPACE/wrt"
          df -Th
          echo "::endgroup::"
          echo "::notice::Build workspace mounted at /builder"

      - name: Init Build Context
        run: |
          echo "BUILD_START_TIME=$(date +%s)" >> "$GITHUB_ENV"
          echo "CACHE_BUCKET=$(date -u +%G%V)" >> "$GITHUB_ENV"
          echo "TAG_TIME=$(TZ=UTC-8 date +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"
          echo "WRT_INFO=immortalwrt" >> "$GITHUB_ENV"

          wrt_target=$(sed -n 's/^CONFIG_TARGET_\([A-Za-z0-9]*\)=y$/\1/p' "$GITHUB_WORKSPACE/Router/Config/General.txt" | head -n1)
          wrt_platform=$(sed -n 's/^CONFIG_TARGET_\([A-Za-z0-9_]*\)=y$/\1/p' "$GITHUB_WORKSPACE/Router/Config/General.txt" | awk '/_/ {print; exit}')
          if [ -z "$wrt_platform" ]; then
            wrt_platform="$wrt_target"
          fi
          echo "WRT_TARGET=$wrt_target" >> "$GITHUB_ENV"
          echo "WRT_PLATFORM=$wrt_platform" >> "$GITHUB_ENV"

          find ./Router -maxdepth 3 -type f -iregex '.*\(txt\|sh\)$' -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Clone Source
        run: |
          echo "::group::Clone source"
          if [ -n "$WRT_COMMIT" ]; then
            git init ./wrt
            cd ./wrt
            git remote add origin "$WRT_REPO"
            git fetch --depth=1 origin "$WRT_COMMIT"
            git checkout FETCH_HEAD
          else
            git clone --depth=1 --single-branch --branch "$WRT_BRANCH" "$WRT_REPO" ./wrt
            cd ./wrt
          fi

          wrt_hash=$(git log -1 --format='%H')
          echo "WRT_HASH=$wrt_hash" >> "$GITHUB_ENV"

          project_mirrors_file="./scripts/projectsmirrors.json"
          if [ -f "$project_mirrors_file" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$project_mirrors_file"
          fi

          toolchain_target_makefile="target/linux/${WRT_TARGET}/Makefile"
          toolchain_signature=$(
            {
              printf '%s\n' "$WRT_BRANCH" "$WRT_TARGET" "$WRT_PLATFORM"
              for file in \
                include/kernel-version.mk \
                include/toolchain-build.mk \
                include/toolchain.mk \
                toolchain/Makefile \
                "$toolchain_target_makefile"; do
                [ -f "$file" ] && sha256sum "$file"
              done
            } | sha256sum | cut -d' ' -f1 | cut -c1-16
          )
          echo "TOOLCHAIN_SIGNATURE=$toolchain_signature" >> "$GITHUB_ENV"
          echo "::endgroup::"
          echo "::notice::Upstream commit: $wrt_hash"

      - name: Restore Download Cache
        id: cache-dl
        uses: actions/cache@v5
        with:
          key: wrt-dl-${{ env.WRT_BRANCH }}-${{ env.CACHE_BUCKET }}
          restore-keys: |
            wrt-dl-${{ env.WRT_BRANCH }}-
            wrt-dl-
          path: ./wrt/dl

      - name: Restore Compiler Cache
        id: cache-ccache
        uses: actions/cache@v5
        with:
          key: wrt-ccache-${{ env.WRT_BRANCH }}-${{ env.WRT_PLATFORM }}-${{ env.CACHE_BUCKET }}-${{ hashFiles('Router/Config/General.txt', 'Router/Config/Custom.txt', 'Router/Scripts/Packages.sh', 'Router/Scripts/Prepare.sh', 'Router/Scripts/Settings.sh') }}
          restore-keys: |
            wrt-ccache-${{ env.WRT_BRANCH }}-${{ env.WRT_PLATFORM }}-${{ hashFiles('Router/Config/General.txt', 'Router/Config/Custom.txt', 'Router/Scripts/Packages.sh', 'Router/Scripts/Prepare.sh', 'Router/Scripts/Settings.sh') }}-
            wrt-ccache-${{ env.WRT_BRANCH }}-${{ env.WRT_PLATFORM }}-
          path: ./wrt/.ccache

      - name: Restore Toolchain Cache
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          key: wrt-toolchain-${{ env.WRT_BRANCH }}-${{ env.WRT_PLATFORM }}-${{ env.TOOLCHAIN_SIGNATURE }}
          restore-keys: |
            wrt-toolchain-${{ env.WRT_BRANCH }}-${{ env.WRT_PLATFORM }}-
          path: |
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Report Cache Status
        run: |
          cache_state() {
            case "$1" in
              true)
                printf 'exact-hit'
                ;;
              false)
                printf 'restore-hit'
                ;;
              *)
                printf 'miss'
                ;;
            esac
          }

          dl_state=$(cache_state '${{ steps.cache-dl.outputs.cache-hit }}')
          ccache_state=$(cache_state '${{ steps.cache-ccache.outputs.cache-hit }}')
          toolchain_state=$(cache_state '${{ steps.cache-toolchain.outputs.cache-hit }}')

          echo "::notice::Download cache: ${dl_state}"
          echo "::notice::Compiler cache: ${ccache_state}"
          if [ "$toolchain_state" = 'miss' ]; then
            echo "::warning::Toolchain cache: ${toolchain_state}"
          else
            echo "::notice::Toolchain cache: ${toolchain_state}"
          fi

          if [ -d "./wrt/staging_dir" ]; then
            find ./wrt/staging_dir -type d -name stamp -not -path '*target*' | while read -r dir; do
              find "$dir" -type f -exec touch {} +
            done
            mkdir -p ./wrt/tmp
            echo '1' > ./wrt/tmp/.build
          fi

      - name: Prepare Sources
        working-directory: ./wrt
        run: |
          echo "::group::Update feeds"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "::endgroup::"

          echo "::group::Apply custom packages and files"
          "$GITHUB_WORKSPACE/Router/Scripts/Packages.sh"
          "$GITHUB_WORKSPACE/Router/Scripts/Prepare.sh"
          echo "::endgroup::"

      - name: Apply Router Config
        working-directory: ./wrt
        run: |
          echo "::group::Generate .config"
          cat "$GITHUB_WORKSPACE/Router/Config/General.txt" >> .config
          cat "$GITHUB_WORKSPACE/Router/Config/Custom.txt" >> .config
          "$GITHUB_WORKSPACE/Router/Scripts/Settings.sh"
          make defconfig -j"$(nproc)"
          echo "::endgroup::"

      - name: Download Sources
        working-directory: ./wrt
        run: |
          list_suspicious_files() {
            find dl -maxdepth 1 -type f -size -1024c | sort
          }

          count_suspicious_files() {
            list_suspicious_files | wc -l | tr -d ' '
          }

          download_jobs=$(( $(nproc) * 2 ))
          if [ "$download_jobs" -gt 16 ]; then
            download_jobs=16
          fi

          echo "::group::Download source archives"
          make download -j"$download_jobs"
          echo "::endgroup::"

          bad_files=$(count_suspicious_files)
          if [ "$bad_files" -gt 0 ]; then
            echo "::warning::Found ${bad_files} suspicious root-level download files smaller than 1 KB"
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              ls -l "$file"
              rm -f "$file"
            done < <(list_suspicious_files)

            echo "::group::Retry source archives download"
            make download -j"$download_jobs"
            echo "::endgroup::"

            remaining_bad_files=$(count_suspicious_files)
            if [ "$remaining_bad_files" -gt 0 ]; then
              while IFS= read -r file; do
                [ -n "$file" ] || continue
                ls -l "$file"
              done < <(list_suspicious_files)
              echo "::error::Download retry still found ${remaining_bad_files} suspicious root-level files smaller than 1 KB"
              exit 1
            fi

            echo "::notice::Suspicious root-level download files were removed and successfully re-downloaded"
          else
            echo "::notice::All downloaded source archives look valid"
          fi

      - name: Compile Firmware
        id: compile
        continue-on-error: true
        working-directory: ./wrt
        run: |
          echo "::group::Parallel build"
          make -j"$(nproc)" 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Retry With Verbose Logs
        id: retry
        if: steps.compile.outcome == 'failure'
        continue-on-error: true
        working-directory: ./wrt
        run: |
          echo "::warning::Parallel build failed, retrying with make -j1 V=s"
          echo "::group::Verbose retry"
          make -j1 V=s 2>&1 | tee -a build.log
          echo "::endgroup::"

      - name: Resolve Build Result
        if: always() && !cancelled()
        run: |
          compile_outcome='${{ steps.compile.outcome }}'
          retry_outcome='${{ steps.retry.outcome }}'
          cache_state() {
            case "$1" in
              true)
                printf 'exact-hit'
                ;;
              false)
                printf 'restore-hit'
                ;;
              *)
                printf 'miss'
                ;;
            esac
          }

          dl_state=$(cache_state '${{ steps.cache-dl.outputs.cache-hit }}')
          ccache_state=$(cache_state '${{ steps.cache-ccache.outputs.cache-hit }}')
          toolchain_state=$(cache_state '${{ steps.cache-toolchain.outputs.cache-hit }}')

          {
            echo "## Router Build Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Branch | \`$WRT_BRANCH\` |"
            echo "| Commit | \`$WRT_HASH\` |"
            echo "| WAN Mode | \`${{ inputs.wan_mode || 'Single WAN' }}\` |"
            echo "| Download Cache | ${dl_state} |"
            echo "| Compiler Cache | ${ccache_state} |"
            echo "| Toolchain Cache | ${toolchain_state} |"
            echo "| Parallel Build | \`$compile_outcome\` |"
            echo "| Verbose Retry | \`${retry_outcome:-skipped}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$compile_outcome" = "success" ] || [ "$retry_outcome" = "success" ]; then
            echo "BUILD_OK=true" >> "$GITHUB_ENV"
            if [ "$retry_outcome" = "success" ]; then
              echo "::notice::Build succeeded after verbose retry"
            else
              echo "::notice::Build succeeded on the first pass"
            fi
          else
            echo "::error::Build failed in both parallel build and verbose retry"
            exit 1
          fi

      - name: Package Firmware And Collect Metadata
        if: env.BUILD_OK == 'true'
        working-directory: ./wrt
        run: |
          build_end_time=$(date +%s)
          build_time=$((build_end_time - BUILD_START_TIME))
          build_hours=$((build_time / 3600))
          build_minutes=$(((build_time % 3600) / 60))
          if [ "$build_hours" -gt 0 ]; then
            build_duration="${build_hours}h${build_minutes}min"
          else
            build_duration="${build_minutes}min"
          fi
          echo "BUILD_DURATION=$build_duration" >> "$GITHUB_ENV"

          kernel_ver=$(find ./bin/targets -type f -name '*.manifest' -exec grep -oP '^kernel - \K[\d\.]+' {} \; | head -1)
          if [ -z "$kernel_ver" ]; then
            kernel_ver=$(grep -m1 '^KERNEL_PATCHVER:=' include/kernel-version.mk | sed 's/^KERNEL_PATCHVER:=//' | tr -d ' ')
          fi
          echo "KERNEL_PATCHVER=$kernel_ver" >> "$GITHUB_ENV"

          luci_ver=$(find ./bin/targets -type f -name '*.manifest' -exec grep -oP '^luci-base - .* openwrt-\K[0-9]+\.[0-9]+' {} \; | head -1)
          if [ -z "$luci_ver" ]; then
            luci_ver=$(cd feeds/luci && git rev-parse --abbrev-ref HEAD 2>/dev/null | grep -oP 'openwrt-\K[0-9]+\.[0-9]+' || true)
          fi
          if [ -z "$luci_ver" ]; then
            luci_ver='unknown'
          fi
          echo "LUCI_VERSION=$luci_ver" >> "$GITHUB_ENV"

          firmware_path=$(find ./bin/targets/x86 -type f -name '*-squashfs-combined-efi.img.gz' | head -n1)
          firmware_name="openwrt-router-${TAG_TIME}-x86-64-efi.img.gz"

          mkdir -p ./upload
          cp -f ./.config "./upload/router-config-${TAG_TIME}.txt"
          cp -f "$firmware_path" "./upload/$firmware_name"
          echo "FIRMWARE_NAME=$firmware_name" >> "$GITHUB_ENV"

          if command -v ccache >/dev/null 2>&1; then
            echo "::group::ccache stats"
            ccache -s || true
            echo "::endgroup::"
          fi

          echo "::notice::Firmware ready: $firmware_name"

          {
            echo "| Build Duration | \`$build_duration\` |"
            echo "| Kernel | \`$kernel_ver\` |"
            echo "| LuCI | \`$luci_ver\` |"
            echo "| Artifact | \`$firmware_name\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Rclone
        if: env.BUILD_OK == 'true'
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Upload Firmware
        if: env.BUILD_OK == 'true'
        run: |
          echo "::group::Upload firmware"
          rclone copy "${{ github.workspace }}/wrt/upload/" remote:/OpenWrt/ \
            --include "*.img.gz" \
            --transfers=1 \
            --stats-one-line \
            --stats=20s
          echo "::endgroup::"
          echo "::notice::Firmware uploaded to remote:/OpenWrt/"

      - name: Send Telegram Message
        if: env.BUILD_OK == 'true'
        run: |
          curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d photo='https://mirror.1991991.xyz/Picture/openwrt.webp' \
            --data-urlencode "caption=#OpenWRT #HomeLab #Router

          *🎉 Ready to roll! Dive in! 🎉*

          - 🛠 Hardware: ${{ env.HARDWARE_MODEL }}

          - 🌐 Kernel: ${{ env.KERNEL_PATCHVER }}

          - 📦 LuCI: ${{ env.LUCI_VERSION }}

          - ⌛ Build Duration: ${{ env.BUILD_DURATION }}

          - 🔗 Firmware: [Click to View](${{ secrets.FIRMWARE_DOWNLOAD_URL }})" \
            -d parse_mode=Markdown >/dev/null 2>&1

      - name: Delete Old Releases And Workflows
        if: always()
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          out_log: false
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0
